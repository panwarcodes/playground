<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>
<body>
    <header>
        <h1>Weather App</h1>
        <form class="citysearcherform">
            <input type="text" name="citylocator" class="citylocator" placeholder="Enter City Name...">
            <button type="submit" class="searchButton">Search</button>
        </form>
    </header>
    <main>
        <span class="cityAndCountryName"></span>
        <span class="currentTemperature"></span>
        <span class="weatherCondition"></span>
        <span class="weatherIcon"></span>
        <span class="humidity"></span>
        <span class="windSpeed"></span>
    </main>
    <script src="../Weather App/script.js"></script>
</body>
</html>
